name: "Branch Flow Protection"

on:
  pull_request:
    branches:
      - bug-fixes

jobs:
  enforce-branch-flow:
    runs-on: ubuntu-latest
    steps:
      - name: validate branch flow
        run: | 
          if [[ "${{ github.head_ref }}" == "main" ]]; then
            echo "Error: Merging from main into 'bug-fixes' is prohibited."
            exit 1
          fi
          echo "Flow is valid."